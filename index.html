<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FitLife AI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <h1 class="logo">
            FitLife AI
        </h1>

        <div class="nav-buttons">

            <button id="loginBtn">
                Login
            </button>

            <button id="darkModeBtn">
                🌙
            </button>

        </div>

    </nav>

    <!-- HERO -->

    <section class="hero">

        <h2>
            Tu nutricionista con IA
        </h2>

        <p>
            Controla comidas, calorías y recibe consejos inteligentes.
        </p>

        <button id="startBtn">
            Empezar
        </button>

    </section>

    <!-- DASHBOARD -->

    <section class="dashboard">

        <!-- PROGRESO -->

        <div class="card">

            <h3>
                🔥 Progreso
            </h3>

            <div class="progress-container">

                <div id="progressBar"></div>

            </div>

            <div class="weight-info">

                <span id="currentWeight">
                    92 kg
                </span>

                <span>
                    Meta: 75 kg
                </span>

            </div>

            <button id="updateWeightBtn">
                Actualizar Peso
            </button>

        </div>

        <!-- CALORIAS -->

        <div class="card">

            <h3>
                🍎 Calorías
            </h3>

            <div class="big-number" id="caloriesValue">
                1800
            </div>

            <p>
                Consumidas hoy
            </p>

            <button id="resetCaloriesBtn">
                Reiniciar
            </button>

        </div>

        <!-- AGUA -->

        <div class="card">

            <h3>
                💧 Agua
            </h3>

            <div class="big-number" id="waterValue">
                1L
            </div>

            <p>
                Consumo diario
            </p>

            <button id="addWaterBtn">
                Agregar Agua
            </button>

        </div>

    </section>

    <!-- COMIDAS -->

    <section class="meals-section">

        <h2>
            Registro de comidas
        </h2>

        <div class="meal-form">

            <input
                type="text"
                id="mealInput"
                placeholder="Ejemplo: pollo con arroz"
            >

            <button id="saveMealBtn">
                Guardar
            </button>

        </div>

        <ul id="mealList"></ul>

    </section>

  

    <!-- FOOTER -->

    <footer>

        <h2>
            FitLife AI
        </h2>

        <p>
            Proyecto fitness moderno con inteligencia artificial.
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
